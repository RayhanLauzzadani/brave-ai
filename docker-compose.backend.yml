services:
  api:
    build:
      context: ./backend
    container_name: brave-ai-api
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://brave:brave_password@postgres:5432/brave_ai
      REDIS_URL: redis://redis:6379/0
      MEDIA_HLS_BASE_URL: http://localhost:8888
      MEDIA_RECORDINGS_DIR: /recordings
      MEDIA_RECORD_SEGMENT_DURATION_SECONDS: 60
      MEDIA_RECORD_MIN_FILE_SIZE_BYTES: 65536
      MEDIA_CLIPS_DIR: /clips
      EVIDENCE_CLIP_MAX_DURATION_SECONDS: 600
      EVIDENCE_CLIP_FFMPEG_TIMEOUT_SECONDS: 180
      EVIDENCE_CLIP_SOURCE_WAIT_SECONDS: 120
      FFMPEG_BINARY: ffmpeg
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./media/recordings:/recordings:ro
      - ./media/clips:/clips
    depends_on:
      - postgres
      - redis

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: brave-ai-mediamtx
    ports:
      - "8554:8554" # RTSP ingest/read
      - "8888:8888" # HLS playback
      - "8889:8889" # WebRTC HTTP endpoint
      - "8189:8189" # WebRTC ICE TCP fallback
      - "8189:8189/udp" # WebRTC ICE UDP
      - "9996:9996" # MediaMTX playback API
      - "9997:9997" # MediaMTX control API
    volumes:
      - ./media:/media:ro
      - ./media/recordings:/recordings
    command: /media/mediamtx.yml

  postgres:
    image: postgres:16-alpine
    container_name: brave-ai-postgres
    environment:
      POSTGRES_DB: brave_ai
      POSTGRES_USER: brave
      POSTGRES_PASSWORD: brave_password
    ports:
      - "5432:5432"
    volumes:
      - brave_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: brave-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - brave_redis_data:/data

volumes:
  brave_postgres_data:
  brave_redis_data: