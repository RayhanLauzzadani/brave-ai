name: Deploy BRAVE AI CCTV

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: brave-ai-cctv-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Compile backend Python
        env:
          PYTHONPYCACHEPREFIX: /tmp/brave-ai-cctv-pycache
        run: python -m compileall backend/app backend/alembic

      - name: Validate production compose
        env:
          APP_HOST: brave-ai.web.id
          POSTGRES_PASSWORD: ci-postgres-password
          SECRET_KEY: ci-secret-key
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Validate Caddy routing
        env:
          APP_HOST: brave-ai.web.id
        run: docker run --rm -e APP_HOST -v "$PWD/deploy:/etc/caddy:ro" caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rsync
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/brave_ai_cctv_deploy
          chmod 600 ~/.ssh/brave_ai_cctv_deploy
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          DEPLOY_USER="${VPS_USER:-root}"
          DEPLOY_DIR="${APP_DIR:-/opt/brave-ai-cctv}"
          ssh -i ~/.ssh/brave_ai_cctv_deploy "$DEPLOY_USER@$VPS_HOST" "mkdir -p '$DEPLOY_DIR/media/recordings'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.next/' \
            --exclude 'node_modules/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/.next/' \
            --exclude 'media/recordings/' \
            --exclude '.env' \
            --exclude '.env.*' \
            -e "ssh -i ~/.ssh/brave_ai_cctv_deploy" \
            ./ "$DEPLOY_USER@$VPS_HOST:$DEPLOY_DIR/"

      - name: Build and restart stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          DEPLOY_USER="${VPS_USER:-root}"
          DEPLOY_DIR="${APP_DIR:-/opt/brave-ai-cctv}"
          ssh -i ~/.ssh/brave_ai_cctv_deploy "$DEPLOY_USER@$VPS_HOST" "
            set -e
            cd '$DEPLOY_DIR'
            test -f .env.production
            docker compose --env-file .env.production -f docker-compose.prod.yml config --quiet
            docker compose --env-file .env.production -f docker-compose.prod.yml run --rm --no-deps caddy caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker compose --env-file .env.production -f docker-compose.prod.yml exec -T api python -m app.db.seed
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
          "