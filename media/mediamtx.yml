# BRAVE AI CCTV - MediaMTX local development config
# MediaMTX turns camera streams into browser-friendly HLS/WebRTC streams and
# records them as small server-side segments for playback/evidence workflows.

logLevel: info
logDestinations: [stdout]

# Control API for future FastAPI integration.
api: true
apiAddress: :9997
apiAllowOrigins: ["*"]

# Playback API for recorded segments.
playback: true
playbackAddress: :9996
playbackAllowOrigins: ["*"]

# RTSP ingest/read. TCP-only avoids UDP port conflicts with FastAPI dev port 8000.
rtsp: true
rtspAddress: :8554
rtspTransports: [tcp]

# HLS playback for the Next.js live camera player.
hls: true
hlsAddress: :8888
hlsAllowOrigins: ["*"]
# Standard fMP4 HLS is more resilient than Low-Latency HLS when a browser
# publisher reconnects and is supported by hls.js and modern mobile browsers.
hlsVariant: fmp4
hlsSegmentCount: 6
hlsSegmentDuration: 2s
# Keep a muxer ready while a camera is live so a new viewer does not have to
# wait for HLS generation to start.
hlsAlwaysRemux: true

# WebRTC read/publish foundation for the next phase.
webrtc: true
webrtcAddress: :8889
webrtcAllowOrigins: ["*"]
webrtcLocalUDPAddress: :8189
# TCP ICE is a fallback for networks that block UDP WebRTC traffic.
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: true
# Public candidates for browser publishers/readers outside Docker/LAN.
webrtcAdditionalHosts: [brave-ai.web.id, 148.230.103.197]

pathDefaults:
  # Pull/publish sources are recorded by the gateway, not by the browser.
  record: true
  recordPath: /recordings/%path/%Y-%m-%d/%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  # One-minute archive files make recent playback available without waiting an hour.
  recordSegmentDuration: 1m
  recordDeleteAfter: 7d

  # Keep sources active for CCTV-style monitoring and recording.
  sourceOnDemand: false

  # A camera path has one publisher. Reject a second publisher instead of
  # disconnecting the healthy one and resetting HLS for every viewer.
  overridePublisher: false

paths:
  # Dynamic paths: camera-1, camera-2, etc.
  # Publish to: rtsp://localhost:8554/camera-1
  # Watch HLS:  http://localhost:8888/camera-1/index.m3u8
  all_others: